name: Update real county data

on:
  workflow_dispatch:
  schedule:
    - cron: "30 7 * * 1"

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download real ACS county indicators
        env:
          CENSUS_API_KEY: ${{ secrets.CENSUS_API_KEY }}
        run: |
          python scripts/update_county_data.py --start-year 2018 --end-year 2024

      - name: Commit updated data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update real ACS county indicators"
          file_pattern: data/county_indicators.json data/metadata.json
